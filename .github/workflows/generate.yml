name: Generate Code with Claude

on:
  workflow_dispatch:
  schedule:
    - cron: '17 10 * * *'
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Anthropic SDK
        run: |
          npm init -y
          npm install @anthropic-ai/sdk

      - name: Generate file with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: node .github/workflows/generate.js

      - name: Commit generated file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generated file from Claude"
