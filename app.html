    <div class="container">

                    <option value="oldest">📅 Najstarsze</option>
                    <option value="alphabetical">🔤 Alfabetycznie</option>

    <script>
        class TaskManager {
            constructor() {
                this.tasks = this.loadTasks();
                this.editingTaskId = null;
                this.initializeEventListeners();
                this.renderTasks();
                this.updateStats();
            }

            initializeEventListeners() {
                document.getElementById('taskForm').addEventListener('submit', (e) => this.handleAddTask(e));
                document.getElementById('searchInput').addEventListener('input', (e) => this.handleSearch(e));
                document.getElementById('sortSelect').addEventListener('change', (e) => this.handleSort(e));
            }

            generateId() {
                return '_' + Math.random().toString(36).substr(2, 9);
            }

            loadTasks() {
                try {
                    const tasks = localStorage.getItem('tasks');
                    return tasks ? JSON.parse(tasks) : [];
                } catch (error) {
                    console.error('Błąd podczas wczytywania zadań:', error);
                    return [];
                }
            }

            saveTasks() {
                try {
                    localStorage.setItem('tasks', JSON.stringify(this.tasks));
                } catch (error) {
                    console.error('Błąd podczas zapisywania zadań:', error);
                }
            }

            addTask(text) {
                const task = {
                    id: this.generateId(),
                    text: text.trim(),
                    completed: false,
                    createdAt: new Date().toISOString()
                };
                this.tasks.unshift(task);
                this.saveTasks();
                this.renderTasks();
                this.updateStats();
            }

            deleteTask(id) {
                this.tasks = this.tasks.filter(task => task.id !== id);
                this.saveTasks();
                this.renderTasks();
                this.updateStats();
            }

            toggleTask(id) {
                const task = this.tasks.find(task => task.id === id);
                if (task) {
                    task.completed = !task.completed;
                    task.completedAt = task.completed ? new Date().toISOString() : null;
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                }
            }

            editTask(id, newText) {
                const task = this.tasks.find(task => task.id === id);
                if (task && newText.trim()) {
                    task.text = newText.trim();
                    task.editedAt = new Date().toISOString();
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                }
            }

            handleAddTask(e) {
                e.preventDefault();
                const input = document.getElementById('taskInput');
                const text = input.value.trim();
                
                if (text) {
                    this.addTask(text);
                    input.value = '';
                    input.focus();
                }
            }

                this.renderTasks(e.target.value.toLowerCase());
            }

            }
