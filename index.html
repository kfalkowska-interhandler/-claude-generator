<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menedżer Zadań</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .controls {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .add-task {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .add-task input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .add-task input:focus {
            outline: none;
            border-color: #4facfe;
        }

        .add-task button {
            padding: 15px 25px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .add-task button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-box:focus {
            outline: none;
            border-color: #4facfe;
        }

        .sort-select {
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .sort-select:focus {
            outline: none;
            border-color: #4facfe;
        }

        .stats {
            display: flex;
            gap: 15px;
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .tasks-container {
            max-height: 500px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #e9ecef;
            transition: background-color 0.2s ease;
        }

        .task-item:hover {
            background-color: #f8f9fa;
        }

        .task-item.completed {
            background-color: #f0f9ff;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-radius: 4px;
            margin-right: 15px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .task-checkbox.checked {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-color: #4facfe;
        }

        .task-checkbox.checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .task-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .task-text {
            font-size: 16px;
            line-height: 1.4;
            transition: all 0.2s ease;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .task-date {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: #ff3742;
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: #999;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #666;
        }

        .empty-state p {
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .controls {
                padding: 20px;
            }

            .add-task {
                flex-direction: column;
            }

            .filters {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                min-width: auto;
            }

            .stats {
                justify-content: center;
                flex-wrap: wrap;
            }

            .task-item {
                padding: 15px 20px;
            }

            .task-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Menedżer Zadań</h1>
            <p>Organizuj swoje zadania efektywnie</p>
        </div>

        <div class="controls">
            <div class="add-task">
                <input type="text" id="taskInput" placeholder="Wpisz nowe zadanie..." maxlength="200">
                <button onclick="addTask()">Dodaj</button>
            </div>

            <div class="filters">
                <input type="text" class="search-box" id="searchBox" placeholder="Szukaj zadań..." onkeyup="filterTasks()">
                <select class="sort-select" id="sortSelect" onchange="sortTasks()">
                    <option value="newest">Najnowsze</option>
                    <option value="oldest">Najstarsze</option>
                    <option value="alphabetical">Alfabetycznie</option>
                    <option value="completed">Ukończone</option>
                    <option value="pending">Oczekujące</option>
                </select>
                <div class="stats">
                    <span id="totalTasks">Wszystkie: 0</span>
                    <span id="completedTasks">Ukończone: 0</span>
                    <span id="pendingTasks">Oczekujące: 0</span>
                </div>
            </div>
        </div>

        <div class="tasks-container" id="tasksContainer">
            <div class="empty-state" id="emptyState">
                <h3>Brak zadań</h3>
                <p>Dodaj swoje pierwsze zadanie, aby rozpocząć organizację pracy</p>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let taskIdCounter = 0;

        function loadTasks() {
            const savedTasks = localStorage.getItem('taskManager_tasks');
            const savedCounter = localStorage.getItem('taskManager_counter');
            
            if (savedTasks) {
                tasks = JSON.parse(savedTasks);
            }
            
            if (savedCounter) {
                taskIdCounter = parseInt(savedCounter);
            }
            
            renderTasks();
            updateStats();
        }

        function saveTasks() {
            localStorage.setItem('taskManager_tasks', JSON.stringify(tasks));
            localStorage.setItem('taskManager_counter', taskIdCounter.toString());
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();
            
            if (taskText === '') return;
            
            const task = {
                id: ++taskIdCounter,
                text: taskText,
                completed: false,
                createdAt: new Date().toISOString()
            };
            
            tasks.unshift(task);
            input.value = '';
            
            saveTasks();
            renderTasks();
            updateStats();
        }

        function deleteTask(taskId) {
            tasks = tasks.filter(task => task.id !== taskId);
            saveTasks();
            renderTasks();
            updateStats();
        }

        function toggleTask(taskId) {
            const task = tasks.find(task => task.id === taskId);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            const emptyState = document.getElementById('emptyState');
            
            let filteredTasks = [...tasks];
            
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            if (searchTerm) {
                filteredTasks = filteredTasks.filter(task => 
                    task.text.toLowerCase().includes(searchTerm)
                );
            }
            
            const sortBy = document.getElementById('sortSelect').value;
            switch (sortBy) {
                case 'oldest':
                    filteredTasks.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                    break;
                case 'alphabetical':
                    filteredTasks.sort((a, b) => a.text.localeCompare(b.text));
                    break;
                case 'completed':
                    filteredTasks.sort((a, b) => b.completed - a.completed);
                    break;
                case 'pending':
                    filteredTasks.sort((a, b) => a.completed - b.completed);
                    break;
                default:
                    filteredTasks.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }
            
            if (filteredTasks.length === 0) {
                emptyState.style.display = 'block';
                container.innerHTML = '';
                container.appendChild(emptyState);
                return;
            }
            
            emptyState.style.display = 'none';
            
            container.innerHTML = filteredTasks.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})"></div>
                    <div class="task-content">
                        <div class="task-text">${escapeHtml(task.text)}</div>
                        <div class="task-date">${formatDate(task.createdAt)}</div>
                    </div>
                    <div class="task-actions">
                        <button class="delete-btn" onclick="deleteTask(${task.id})">Usuń</button>
                    </div>
                </div>
            `).join('');
        }

        function filterTasks() {
            renderTasks();
        }

        function sortTasks() {
            renderTasks();
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(task => task.completed).length;
            const pending = total - completed;
            
            document.getElementById('totalTasks').textContent = `Wszystkie: ${total}`;
            document.getElementById('completedTasks').textContent = `Ukończone: ${completed}`;
            document.getElementById('pendingTasks').textContent = `Oczekujące: ${pending}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('pl-PL', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            loadTasks();
        });
    </script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const nodes = Array.from(document.body.childNodes);

  for (const node of nodes) {
    if (
      node.nodeType === Node.TEXT_NODE &&
      node.textContent &&
      (
        node.textContent.trim().startsWith('```html') ||
        node.textContent.trim() === '```' ||
        node.textContent.trim() === 'html'
      )
    ) {
      node.remove();
    }
  }
});
</script>

</body>
</html>
