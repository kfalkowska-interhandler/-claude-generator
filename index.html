<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menedżer Zadań</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .controls {
            padding: 30px;
            border-bottom: 1px solid #eee;
        }

        .task-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .task-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .task-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .search-sort {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
        }

        .sort-select {
            padding: 10px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .tasks-container {
            padding: 30px;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        .task-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .task-item.completed {
            opacity: 0.7;
            border-left-color: #28a745;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #6c757d;
        }

        .task-checkbox {
            margin-right: 15px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            line-height: 1.4;
        }

        .task-date {
            font-size: 12px;
            color: #6c757d;
            margin-right: 15px;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
        }

        .btn-delete:hover {
            background: #c82333;
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #6c757d;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: #f8f9fa;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #6c757d;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .controls {
                padding: 20px;
            }

            .task-form {
                flex-direction: column;
            }

            .task-input {
                min-width: 100%;
            }

            .search-sort {
                flex-direction: column;
            }

            .search-input {
                min-width: 100%;
            }

            .tasks-container {
                padding: 20px;
            }

            .task-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .task-content {
                display: flex;
                align-items: center;
                width: 100%;
            }

            .task-actions {
                display: flex;
                justify-content: space-between;
                width: 100%;
                align-items: center;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Menedżer Zadań</h1>
            <p>Organizuj swoje zadania w sposób efektywny</p>
        </div>

        <div class="controls">
            <div class="task-form">
                <input type="text" id="taskInput" class="task-input" placeholder="Dodaj nowe zadanie..." maxlength="200">
                <button onclick="addTask()" class="btn btn-primary">Dodaj zadanie</button>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Wszystkie</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="activeTasks">0</div>
                    <div class="stat-label">Aktywne</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completedTasks">0</div>
                    <div class="stat-label">Ukończone</div>
                </div>
            </div>

            <div class="search-sort">
                <input type="text" id="searchInput" class="search-input" placeholder="Szukaj zadań..." onkeyup="filterTasks()">
                <select id="sortSelect" class="sort-select" onchange="sortTasks()">
                    <option value="newest">Najnowsze</option>
                    <option value="oldest">Najstarsze</option>
                    <option value="alphabetical">Alfabetycznie</option>
                    <option value="completed">Ukończone</option>
                    <option value="pending">Oczekujące</option>
                </select>
            </div>
        </div>

        <div class="tasks-container">
            <div id="tasksList"></div>
        </div>
    </div>

    <script>
        let tasks = [];
        let filteredTasks = [];

        function loadTasks() {
            const savedTasks = localStorage.getItem('tasks');
            if (savedTasks) {
                tasks = JSON.parse(savedTasks);
                filteredTasks = [...tasks];
                renderTasks();
                updateStats();
            }
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const taskText = taskInput.value.trim();

            if (taskText === '') {
                alert('Wprowadź tekst zadania!');
                return;
            }

            const newTask = {
                id: Date.now(),
                text: taskText,
                completed: false,
                dateCreated: new Date().toLocaleString('pl-PL')
            };

            tasks.unshift(newTask);
            taskInput.value = '';
            saveTasks();
            filterTasks();
            updateStats();
        }

        function deleteTask(id) {
            if (confirm('Czy na pewno chcesz usunąć to zadanie?')) {
                tasks = tasks.filter(task => task.id !== id);
                saveTasks();
                filterTasks();
                updateStats();
            }
        }

        function toggleTask(id) {
            tasks = tasks.map(task => {
                if (task.id === id) {
                    return { ...task, completed: !task.completed };
                }
                return task;
            });
            saveTasks();
            filterTasks();
            updateStats();
        }

        function filterTasks() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            filteredTasks = tasks.filter(task => 
                task.text.toLowerCase().includes(searchTerm)
            );

            sortTasks();
        }

        function sortTasks() {
            const sortBy = document.getElementById('sortSelect').value;

            switch (sortBy) {
                case 'newest':
                    filteredTasks.sort((a, b) => b.id - a.id);
                    break;
                case 'oldest':
                    filteredTasks.sort((a, b) => a.id - b.id);
                    break;
                case 'alphabetical':
                    filteredTasks.sort((a, b) => a.text.localeCompare(b.text));
                    break;
                case 'completed':
                    filteredTasks.sort((a, b) => b.completed - a.completed);
                    break;
                case 'pending':
                    filteredTasks.sort((a, b) => a.completed - b.completed);
                    break;
            }

            renderTasks();
        }

        function renderTasks() {
            const tasksList = document.getElementById('tasksList');

            if (filteredTasks.length === 0) {
                tasksList.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 4rem; margin-bottom: 20px;">📝</div>
                        <h3>Brak zadań</h3>
                        <p>Dodaj swoje pierwsze zadanie, aby rozpocząć!</p>
                    </div>
                `;
                return;
            }

            tasksList.innerHTML = filteredTasks.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <div class="task-content">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                               onchange="toggleTask(${task.id})">
                        <span class="task-text">${task.text}</span>
                    </div>
                    <div class="task-actions">
                        <span class="task-date">${task.dateCreated}</span>
                        <button onclick="deleteTask(${task.id})" class="btn btn-delete">Usuń</button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(task => task.completed).length;
            const active = total - completed;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('activeTasks').textContent = active;
            document.getElementById('completedTasks').textContent = completed;
        }

        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        window.addEventListener('load', loadTasks);
    </script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const nodes = Array.from(document.body.childNodes);

  for (const node of nodes) {
    if (
      node.nodeType === Node.TEXT_NODE &&
      node.textContent &&
      (
        node.textContent.trim().startsWith('```html') ||
        node.textContent.trim() === '```' ||
        node.textContent.trim() === 'html'
      )
    ) {
      node.remove();
    }
  }
});
</script>

</body>
</html>
