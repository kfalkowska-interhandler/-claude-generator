<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menedżer Zadań</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .content {
            padding: 30px;
        }

        .task-input-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #taskInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        #taskInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #addTaskBtn {
            padding: 15px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        #addTaskBtn:hover {
            transform: translateY(-2px);
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        #searchInput {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        #sortSelect {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            background: white;
        }

        .task-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: #f1f3f4;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
            min-width: 120px;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .tasks-container {
            min-height: 200px;
        }

        .task-item {
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        .task-item:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .task-item.completed {
            background: #f8f9fa;
            opacity: 0.7;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .task-text {
            flex: 1;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #888;
        }

        .task-date {
            font-size: 0.9rem;
            color: #666;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 15px;
        }

        .task-delete {
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .task-delete:hover {
            background: #ff3838;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #333;
        }

        .empty-description {
            font-size: 1rem;
            opacity: 0.8;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .container {
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
            }

            .header h1 {
                font-size: 2rem;
            }

            .content {
                padding: 20px;
            }

            .input-group {
                flex-direction: column;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            #searchInput {
                min-width: auto;
            }

            .task-stats {
                justify-content: center;
            }

            .stat-item {
                flex: none;
                min-width: 100px;
            }

            .task-item {
                padding: 15px;
                flex-wrap: wrap;
                gap: 10px;
            }

            .task-date {
                order: -1;
                align-self: flex-start;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .task-input-section {
                padding: 20px;
                border-radius: 10px;
            }

            .task-item {
                padding: 12px;
            }

            .task-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Menedżer Zadań</h1>
            <p>Organizuj swoje zadania w prosty i efektywny sposób</p>
        </div>

        <div class="content">
            <div class="task-input-section">
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="Wprowadź nowe zadanie..." maxlength="200">
                    <button id="addTaskBtn">Dodaj zadanie</button>
                </div>
                
                <div class="controls">
                    <input type="text" id="searchInput" placeholder="Wyszukaj zadania...">
                    <select id="sortSelect">
                        <option value="newest">Najnowsze</option>
                        <option value="oldest">Najstarsze</option>
                        <option value="alphabetical">Alfabetycznie</option>
                        <option value="completed">Ukończone na końcu</option>
                    </select>
                </div>
            </div>

            <div class="task-stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Wszystkie</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="pendingTasks">0</div>
                    <div class="stat-label">Do zrobienia</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completedTasks">0</div>
                    <div class="stat-label">Ukończone</div>
                </div>
            </div>

            <div class="tasks-container" id="tasksContainer">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📝</div>
                    <div class="empty-title">Brak zadań</div>
                    <div class="empty-description">Dodaj swoje pierwsze zadanie, aby rozpocząć organizację pracy</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class TaskManager {
            constructor() {
                this.tasks = this.loadTasks();
                this.filteredTasks = [...this.tasks];
                this.initializeElements();
                this.bindEvents();
                this.render();
            }

            initializeElements() {
                this.taskInput = document.getElementById('taskInput');
                this.addTaskBtn = document.getElementById('addTaskBtn');
                this.searchInput = document.getElementById('searchInput');
                this.sortSelect = document.getElementById('sortSelect');
                this.tasksContainer = document.getElementById('tasksContainer');
                this.emptyState = document.getElementById('emptyState');
                this.totalTasks = document.getElementById('totalTasks');
                this.pendingTasks = document.getElementById('pendingTasks');
                this.completedTasks = document.getElementById('completedTasks');
            }

            bindEvents() {
                this.addTaskBtn.addEventListener('click', () => this.addTask());
                this.taskInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTask();
                });
                this.searchInput.addEventListener('input', () => this.filterTasks());
                this.sortSelect.addEventListener('change', () => this.sortTasks());
            }

            addTask() {
                const text = this.taskInput.value.trim();
                if (!text) return;

                const task = {
                    id: Date.now(),
                    text: text,
                    completed: false,
                    createdAt: new Date().toISOString()
                };

                this.tasks.unshift(task);
                this.taskInput.value = '';
                this.saveTasks();
                this.filterTasks();
            }

            toggleTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    this.saveTasks();
                    this.filterTasks();
                }
            }

            deleteTask(id) {
                this.tasks = this.tasks.filter(t => t.id !== id);
                this.saveTasks();
                this.filterTasks();
            }

            filterTasks() {
                const searchTerm = this.searchInput.value.toLowerCase();
                this.filteredTasks = this.tasks.filter(task =>
                    task.text.toLowerCase().includes(searchTerm)
                );
                this.sortTasks();
            }

            sortTasks() {
                const sortBy = this.sortSelect.value;
                
                this.filteredTasks.sort((a, b) => {
                    switch(sortBy) {
                        case 'oldest':
                            return new Date(a.createdAt) - new Date(b.createdAt);
                        case 'alphabetical':
                            return a.text.localeCompare(b.text);
                        case 'completed':
                            if (a.completed !== b.completed) {
                                return a.completed ? 1 : -1;
                            }
                            return new Date(b.createdAt) - new Date(a.createdAt);
                        default: // newest
                            return new Date(b.createdAt) - new Date(a.createdAt);
                    }
                });
                
                this.render();
            }

            render() {
                this.updateStats();
                
                if (this.filteredTasks.length === 0) {
                    this.emptyState.style.display = 'block';
                    this.tasksContainer.innerHTML = '';
                    this.tasksContainer.appendChild(this.emptyState);
                    return;
                }

                this.emptyState.style.display = 'none';
                this.tasksContainer.innerHTML = '';

                this.filteredTasks.forEach(task => {
                    const taskElement = this.createTaskElement(task);
                    this.tasksContainer.appendChild(taskElement);
                });
            }

            createTaskElement(task) {
                const taskItem = document.createElement('div');
                taskItem.className = `task-item ${task.completed ? 'completed' : ''}`;
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'task-checkbox';
                checkbox.checked = task.completed;
                checkbox.addEventListener('change', () => this.toggleTask(task.id));

                const taskText = document.createElement('span');
                taskText.className = 'task-text';
                taskText.textContent = task.text;

                const taskDate = document.createElement('span');
                taskDate.className = 'task-date';
                taskDate.textContent = this.formatDate(task.createdAt);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'task-delete';
                deleteBtn.textContent = 'Usuń';
                deleteBtn.addEventListener('click', () => this.deleteTask(task.id));

                taskItem.appendChild(checkbox);
                taskItem.appendChild(taskText);
                taskItem.appendChild(taskDate);
                taskItem.appendChild(deleteBtn);

                return taskItem;
            }

            updateStats() {
                const total = this.tasks.length;
                const completed = this.tasks.filter(t => t.completed).length;
                const pending = total - completed;

                this.totalTasks.textContent = total;
                this.pendingTasks.textContent = pending;
                this.completedTasks.textContent = completed;
            }

            formatDate(dateString) {
                const date = new Date(dateString);
                return date.toLocaleDateString('pl-PL', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
            }

            loadTasks() {
                const tasks = localStorage.getItem('tasks');
                return tasks ? JSON.parse(tasks) : [];
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new TaskManager();
        });
    </script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const nodes = Array.from(document.body.childNodes);

  for (const node of nodes) {
    if (
      node.nodeType === Node.TEXT_NODE &&
      node.textContent &&
      (
        node.textContent.trim().startsWith('```html') ||
        node.textContent.trim() === '```' ||
        node.textContent.trim() === 'html'
      )
    ) {
      node.remove();
    }
  }
});
</script>

</body>
</html>
