<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menedżer Zadań</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .controls {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .task-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .task-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .task-input:focus {
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .search-sort {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .search-input:focus {
            border-color: #667eea;
        }

        .sort-select {
            padding: 10px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        .tasks-container {
            padding: 30px;
            min-height: 200px;
        }

        .task-item {
            background: white;
            border: 2px solid #f1f3f4;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
            position: relative;
        }

        .task-item:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .task-item.completed {
            background: #f8f9fa;
            border-color: #28a745;
        }

        .task-content {
            display: flex;
            align-items: center;
            flex: 1;
            gap: 15px;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #28a745;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            line-height: 1.5;
            transition: all 0.3s;
        }

        .task-text.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .task-date {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 6px;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: #f8f9fa;
            padding: 20px;
            border-top: 1px solid #e9ecef;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #6c757d;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .task-form {
                flex-direction: column;
            }

            .search-sort {
                flex-direction: column;
            }

            .task-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .task-actions {
                align-self: flex-end;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 20px;
            }

            .controls, .tasks-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Menedżer Zadań</h1>
            <p>Organizuj swoje zadania efektywnie</p>
        </div>

        <div class="controls">
            <form class="task-form" id="taskForm">
                <input type="text" class="task-input" id="taskInput" placeholder="Dodaj nowe zadanie..." required>
                <button type="submit" class="btn btn-primary">Dodaj</button>
            </form>

            <div class="search-sort">
                <input type="text" class="search-input" id="searchInput" placeholder="Szukaj zadań...">
                <select class="sort-select" id="sortSelect">
                    <option value="newest">Najnowsze</option>
                    <option value="oldest">Najstarsze</option>
                    <option value="alphabetical">Alfabetycznie</option>
                    <option value="completed">Wykonane</option>
                    <option value="pending">Oczekujące</option>
                </select>
            </div>
        </div>

        <div class="tasks-container" id="tasksContainer">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">📝</div>
                <h3>Brak zadań</h3>
                <p>Dodaj swoje pierwsze zadanie, aby rozpocząć!</p>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">Wszystkie</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">Wykonane</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="pendingTasks">0</div>
                <div class="stat-label">Oczekujące</div>
            </div>
        </div>
    </div>

    <script>
        class TaskManager {
            constructor() {
                this.tasks = this.loadTasks();
                this.init();
            }

            init() {
                this.bindEvents();
                this.renderTasks();
                this.updateStats();
            }

            bindEvents() {
                document.getElementById('taskForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.addTask();
                });

                document.getElementById('searchInput').addEventListener('input', () => {
                    this.renderTasks();
                });

                document.getElementById('sortSelect').addEventListener('change', () => {
                    this.renderTasks();
                });
            }

            addTask() {
                const input = document.getElementById('taskInput');
                const text = input.value.trim();
                
                if (!text) return;

                const task = {
                    id: Date.now(),
                    text: text,
                    completed: false,
                    createdAt: new Date().toISOString()
                };

                this.tasks.unshift(task);
                this.saveTasks();
                this.renderTasks();
                this.updateStats();
                input.value = '';
            }

            toggleTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    task.completedAt = task.completed ? new Date().toISOString() : null;
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                }
            }

            deleteTask(id) {
                if (confirm('Czy na pewno chcesz usunąć to zadanie?')) {
                    this.tasks = this.tasks.filter(t => t.id !== id);
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                }
            }

            getFilteredAndSortedTasks() {
                let filteredTasks = [...this.tasks];

                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                if (searchTerm) {
                    filteredTasks = filteredTasks.filter(task => 
                        task.text.toLowerCase().includes(searchTerm)
                    );
                }

                const sortBy = document.getElementById('sortSelect').value;
                switch (sortBy) {
                    case 'oldest':
                        filteredTasks.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                        break;
                    case 'alphabetical':
                        filteredTasks.sort((a, b) => a.text.localeCompare(b.text, 'pl'));
                        break;
                    case 'completed':
                        filteredTasks.sort((a, b) => b.completed - a.completed);
                        break;
                    case 'pending':
                        filteredTasks.sort((a, b) => a.completed - b.completed);
                        break;
                    default: // newest
                        filteredTasks.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                }

                return filteredTasks;
            }

            renderTasks() {
                const container = document.getElementById('tasksContainer');
                const emptyState = document.getElementById('emptyState');
                const filteredTasks = this.getFilteredAndSortedTasks();

                if (filteredTasks.length === 0) {
                    container.innerHTML = '';
                    container.appendChild(emptyState);
                    return;
                }

                container.innerHTML = '';
                
                filteredTasks.forEach(task => {
                    const taskElement = this.createTaskElement(task);
                    container.appendChild(taskElement);
                });
            }

            createTaskElement(task) {
                const div = document.createElement('div');
                div.className = `task-item ${task.completed ? 'completed' : ''}`;

                const date = new Date(task.createdAt).toLocaleDateString('pl-PL', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                div.innerHTML = `
                    <div class="task-content">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                        <div>
                            <div class="task-text ${task.completed ? 'completed' : ''}">${task.text}</div>
                            <div class="task-date">Utworzono: ${date}</div>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="btn btn-danger btn-small delete-btn">Usuń</button>
                    </div>
                `;

                div.querySelector('.task-checkbox').addEventListener('change', () => {
                    this.toggleTask(task.id);
                });

                div.querySelector('.delete-btn').addEventListener('click', () => {
                    this.deleteTask(task.id);
                });

                return div;
            }

            updateStats() {
                const total = this.tasks.length;
                const completed = this.tasks.filter(t => t.completed).length;
                const pending = total - completed;

                document.getElementById('totalTasks').textContent = total;
                document.getElementById('completedTasks').textContent = completed;
                document.getElementById('pendingTasks').textContent = pending;
            }

            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
            }

            loadTasks() {
                const saved = localStorage.getItem('tasks');
                return saved ? JSON.parse(saved) : [];
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new TaskManager();
        });
    </script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const nodes = Array.from(document.body.childNodes);

  for (const node of nodes) {
    if (
      node.nodeType === Node.TEXT_NODE &&
      node.textContent &&
      (
        node.textContent.trim().startsWith('```html') ||
        node.textContent.trim() === '```' ||
        node.textContent.trim() === 'html'
      )
    ) {
      node.remove();
    }
  }
});
</script>

</body>
</html>
