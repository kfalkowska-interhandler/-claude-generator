<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menedżer Zadań</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .main-content {
            padding: 30px;
        }

        .task-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .task-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            min-width: 250px;
        }

        .task-input:focus {
            border-color: #4facfe;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
        }

        .btn-danger {
            background: linear-gradient(45deg, #ff6b6b 0%, #ee5a52 100%);
            color: white;
            padding: 8px 15px;
            font-size: 14px;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .search-box:focus {
            border-color: #4facfe;
        }

        .sort-select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: white;
            cursor: pointer;
        }

        .sort-select:focus {
            border-color: #4facfe;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
            min-width: 120px;
        }

        .stat-item h3 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .stat-item p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .tasks-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 4px solid #4facfe;
            transition: all 0.3s;
        }

        .task-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .task-item.completed {
            opacity: 0.7;
            border-left-color: #28a745;
            background: #e8f5e8;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            transform: scale(1.2);
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            word-break: break-word;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #6c757d;
        }

        .task-date {
            font-size: 12px;
            color: #6c757d;
            margin-right: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #495057;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .main-content {
                padding: 20px;
            }

            .task-form {
                flex-direction: column;
            }

            .task-input {
                min-width: 100%;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                min-width: 100%;
            }

            .stats {
                flex-direction: column;
            }

            .task-item {
                flex-wrap: wrap;
                gap: 10px;
            }

            .task-date {
                order: 3;
                width: 100%;
                margin: 0;
                margin-top: 5px;
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Menedżer Zadań</h1>
            <p>Organizuj swoje zadania efektywnie</p>
        </div>
        
        <div class="main-content">
            <form class="task-form" id="taskForm">
                <input type="text" class="task-input" id="taskInput" placeholder="Wpisz nowe zadanie..." required>
                <button type="submit" class="btn btn-primary">Dodaj zadanie</button>
            </form>

            <div class="controls">
                <input type="text" class="search-box" id="searchBox" placeholder="Szukaj zadań...">
                <select class="sort-select" id="sortSelect">
                    <option value="newest">Najnowsze</option>
                    <option value="oldest">Najstarsze</option>
                    <option value="alphabetical">Alfabetycznie</option>
                    <option value="completed">Ukończone</option>
                    <option value="pending">Oczekujące</option>
                </select>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <h3 id="totalTasks">0</h3>
                    <p>Wszystkie zadania</p>
                </div>
                <div class="stat-item">
                    <h3 id="completedTasks">0</h3>
                    <p>Ukończone</p>
                </div>
                <div class="stat-item">
                    <h3 id="pendingTasks">0</h3>
                    <p>Oczekujące</p>
                </div>
            </div>

            <div class="tasks-list" id="tasksList">
                <div class="empty-state" id="emptyState">
                    <h3>Brak zadań</h3>
                    <p>Dodaj swoje pierwsze zadanie, aby rozpocząć!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        class TaskManager {
            constructor() {
                this.tasks = this.loadTasks();
                this.currentFilter = '';
                this.currentSort = 'newest';
                
                this.initEventListeners();
                this.renderTasks();
                this.updateStats();
            }

            initEventListeners() {
                document.getElementById('taskForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.addTask();
                });

                document.getElementById('searchBox').addEventListener('input', (e) => {
                    this.currentFilter = e.target.value.toLowerCase();
                    this.renderTasks();
                });

                document.getElementById('sortSelect').addEventListener('change', (e) => {
                    this.currentSort = e.target.value;
                    this.renderTasks();
                });
            }

            addTask() {
                const input = document.getElementById('taskInput');
                const taskText = input.value.trim();

                if (taskText === '') return;

                const task = {
                    id: Date.now(),
                    text: taskText,
                    completed: false,
                    createdAt: new Date().toISOString()
                };

                this.tasks.unshift(task);
                this.saveTasks();
                this.renderTasks();
                this.updateStats();
                
                input.value = '';
                input.focus();
            }

            deleteTask(taskId) {
                this.tasks = this.tasks.filter(task => task.id !== taskId);
                this.saveTasks();
                this.renderTasks();
                this.updateStats();
            }

            toggleTask(taskId) {
                const task = this.tasks.find(task => task.id === taskId);
                if (task) {
                    task.completed = !task.completed;
                    task.completedAt = task.completed ? new Date().toISOString() : null;
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                }
            }

            filterTasks() {
                return this.tasks.filter(task => 
                    task.text.toLowerCase().includes(this.currentFilter)
                );
            }

            sortTasks(tasks) {
                const sortedTasks = [...tasks];

                switch (this.currentSort) {
                    case 'oldest':
                        return sortedTasks.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                    case 'alphabetical':
                        return sortedTasks.sort((a, b) => a.text.localeCompare(b.text));
                    case 'completed':
                        return sortedTasks.sort((a, b) => b.completed - a.completed);
                    case 'pending':
                        return sortedTasks.sort((a, b) => a.completed - b.completed);
                    case 'newest':
                    default:
                        return sortedTasks.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                }
            }

            renderTasks() {
                const tasksList = document.getElementById('tasksList');
                const emptyState = document.getElementById('emptyState');
                
                let filteredTasks = this.filterTasks();
                filteredTasks = this.sortTasks(filteredTasks);

                if (filteredTasks.length === 0) {
                    if (this.tasks.length === 0) {
                        emptyState.style.display = 'block';
                        tasksList.innerHTML = '';
                        tasksList.appendChild(emptyState);
                    } else {
                        tasksList.innerHTML = '<div class="empty-state"><h3>Brak wyników</h3><p>Nie znaleziono zadań pasujących do kryteriów wyszukiwania.</p></div>';
                    }
                    return;
                }

                emptyState.style.display = 'none';
                tasksList.innerHTML = '';

                filteredTasks.forEach(task => {
                    const taskElement = this.createTaskElement(task);
                    tasksList.appendChild(taskElement);
                });
            }

            createTaskElement(task) {
                const taskItem = document.createElement('div');
                taskItem.className = `task-item fade-in ${task.completed ? 'completed' : ''}`;

                const formatDate = (dateString) => {
                    const date = new Date(dateString);
                    return date.toLocaleDateString('pl-PL', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                };

                taskItem.innerHTML = `
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                           onchange="taskManager.toggleTask(${task.id})">
                    <span class="task-text">${this.escapeHtml(task.text)}</span>
                    <span class="task-date">Utworzono: ${formatDate(task.createdAt)}</span>
                    <button class="btn btn-danger" onclick="taskManager.deleteTask(${task.id})">
                        Usuń
                    </button>
                `;

                return taskItem;
            }

            updateStats() {
                const total = this.tasks.length;
                const completed = this.tasks.filter(task => task.completed).length;
                const pending = total - completed;

                document.getElementById('totalTasks').textContent = total;
                document.getElementById('completedTasks').textContent = completed;
                document.getElementById('pendingTasks').textContent = pending;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            saveTasks() {
                localStorage.setItem('taskManagerTasks', JSON.stringify(this.tasks));
            }

            loadTasks() {
                try {
                    const saved = localStorage.getItem('taskManagerTasks');
                    return saved ? JSON.parse(saved) : [];
                } catch (error) {
                    console.error('Błąd podczas wczytywania zadań:', error);
                    return [];
                }
            }
        }

        const taskManager = new TaskManager();
    </script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const nodes = Array.from(document.body.childNodes);

  for (const node of nodes) {
    if (
      node.nodeType === Node.TEXT_NODE &&
      node.textContent &&
      (
        node.textContent.trim().startsWith('```html') ||
        node.textContent.trim() === '```' ||
        node.textContent.trim() === 'html'
      )
    ) {
      node.remove();
    }
  }
});
</script>

</body>
</html>
