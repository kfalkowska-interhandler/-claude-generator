<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menedżer Zadań</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .controls {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .add-task {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .task-input {
            flex: 1;
            min-width: 200px;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .task-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .search-sort {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 14px;
        }

        .sort-select {
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-item {
            text-align: center;
            min-width: 100px;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            display: block;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .tasks-container {
            padding: 30px;
            min-height: 300px;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 20px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        .task-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .task-item.completed {
            opacity: 0.7;
            border-left-color: #28a745;
            background: #e8f5e8;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
            transform: scale(1.2);
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #666;
        }

        .task-date {
            font-size: 12px;
            color: #666;
            margin-right: 15px;
        }

        .task-delete {
            background: #dc3545;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .task-delete:hover {
            background: #c82333;
            transform: scale(1.1);
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .empty-state img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 2em;
            }

            .controls,
            .tasks-container {
                padding: 20px;
            }

            .add-task {
                flex-direction: column;
            }

            .task-input,
            .btn {
                width: 100%;
            }

            .search-sort {
                flex-direction: column;
            }

            .search-input,
            .sort-select {
                width: 100%;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }

            .task-item {
                flex-wrap: wrap;
                gap: 10px;
            }

            .task-date {
                order: 3;
                width: 100%;
                margin-right: 0;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Menedżer Zadań</h1>
            <p>Organizuj swoje zadania w prosty i skuteczny sposób</p>
        </div>

        <div class="controls">
            <div class="add-task">
                <input type="text" class="task-input" id="taskInput" placeholder="Wprowadź nowe zadanie..." maxlength="200">
                <button class="btn btn-primary" onclick="addTask()">Dodaj zadanie</button>
            </div>
            
            <div class="search-sort">
                <input type="text" class="search-input" id="searchInput" placeholder="Szukaj zadań...">
                <select class="sort-select" id="sortSelect">
                    <option value="newest">Najnowsze</option>
                    <option value="oldest">Najstarsze</option>
                    <option value="alphabetical">Alfabetycznie</option>
                    <option value="completed">Ukończone</option>
                    <option value="pending">Oczekujące</option>
                </select>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="totalTasks">0</span>
                <div class="stat-label">Wszystkie</div>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="completedTasks">0</span>
                <div class="stat-label">Ukończone</div>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="pendingTasks">0</span>
                <div class="stat-label">Oczekujące</div>
            </div>
        </div>

        <div class="tasks-container" id="tasksContainer">
            <div class="empty-state" id="emptyState">
                <div style="font-size: 60px; margin-bottom: 20px;">📋</div>
                <h3>Brak zadań</h3>
                <p>Dodaj swoje pierwsze zadanie, aby rozpocząć!</p>
            </div>
        </div>
    </div>

    <script>
        class TaskManager {
            constructor() {
                this.tasks = this.loadTasks();
                this.init();
            }

            init() {
                this.bindEvents();
                this.renderTasks();
                this.updateStats();
            }

            bindEvents() {
                document.getElementById('taskInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.addTask();
                    }
                });

                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.renderTasks(e.target.value);
                });

                document.getElementById('sortSelect').addEventListener('change', () => {
                    this.renderTasks();
                });
            }

            addTask() {
                const input = document.getElementById('taskInput');
                const taskText = input.value.trim();

                if (!taskText) {
                    this.showNotification('Wprowadź treść zadania!', 'error');
                    return;
                }

                const newTask = {
                    id: Date.now(),
                    text: taskText,
                    completed: false,
                    createdAt: new Date().toISOString()
                };

                this.tasks.unshift(newTask);
                this.saveTasks();
                this.renderTasks();
                this.updateStats();
                
                input.value = '';
                this.showNotification('Zadanie zostało dodane!', 'success');
            }

            deleteTask(taskId) {
                if (confirm('Czy na pewno chcesz usunąć to zadanie?')) {
                    this.tasks = this.tasks.filter(task => task.id !== taskId);
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                    this.showNotification('Zadanie zostało usunięte!', 'success');
                }
            }

            toggleTask(taskId) {
                const task = this.tasks.find(task => task.id === taskId);
                if (task) {
                    task.completed = !task.completed;
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                    
                    const message = task.completed ? 'Zadanie oznaczone jako ukończone!' : 'Zadanie oznaczone jako nieukończone!';
                    this.showNotification(message, 'success');
                }
            }

            renderTasks(searchQuery = '') {
                const container = document.getElementById('tasksContainer');
                const emptyState = document.getElementById('emptyState');
                const sortValue = document.getElementById('sortSelect').value;
                
                let filteredTasks = this.filterTasks(searchQuery);
                filteredTasks = this.sortTasks(filteredTasks, sortValue);

                if (filteredTasks.length === 0) {
                    container.innerHTML = '';
                    container.appendChild(emptyState);
                    return;
                }

                const tasksHTML = filteredTasks.map(task => this.createTaskHTML(task)).join('');
                container.innerHTML = tasksHTML;
            }

            filterTasks(searchQuery) {
                if (!searchQuery) {
                    return [...this.tasks];
                }

                return this.tasks.filter(task => 
                    task.text.toLowerCase().includes(searchQuery.toLowerCase())
                );
            }

            sortTasks(tasks, sortValue) {
                switch (sortValue) {
                    case 'oldest':
                        return tasks.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                    case 'alphabetical':
                        return tasks.sort((a, b) => a.text.localeCompare(b.text, 'pl'));
                    case 'completed':
                        return tasks.filter(task => task.completed).concat(tasks.filter(task => !task.completed));
                    case 'pending':
                        return tasks.filter(task => !task.completed).concat(tasks.filter(task => task.completed));
                    default: // newest
                        return tasks.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                }
            }

            createTaskHTML(task) {
                const date = new Date(task.createdAt).toLocaleDateString('pl-PL', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                return `
                    <div class="task-item ${task.completed ? 'completed' : ''}">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                               onchange="taskManager.toggleTask(${task.id})">
                        <span class="task-text">${this.escapeHtml(task.text)}</span>
                        <span class="task-date">${date}</span>
                        <button class="task-delete" onclick="taskManager.deleteTask(${task.id})" title="Usuń zadanie">
                            ×
                        </button>
                    </div>
                `;
            }

            updateStats() {
                const total = this.tasks.length;
                const completed = this.tasks.filter(task => task.completed).length;
                const pending = total - completed;

                document.getElementById('totalTasks').textContent = total;
                document.getElementById('completedTasks').textContent = completed;
                document.getElementById('pendingTasks').textContent = pending;
            }

            saveTasks() {
                try {
                    localStorage.setItem('tasks', JSON.stringify(this.tasks));
                } catch (error) {
                    this.showNotification('Błąd podczas zapisywania danych!', 'error');
                }
            }

            loadTasks() {
                try {
                    const saved = localStorage.getItem('tasks');
                    return saved ? JSON.parse(saved) : [];
                } catch (error) {
                    this.showNotification('Błąd podczas wczytywania danych!', 'error');
                    return [];
                }
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            showNotification(message, type) {
                // Usuń istniejące powiadomienia
                const existing = document.querySelector('.notification');
                if (existing) {
                    existing.remove();
                }

                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.textContent = message;
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 15px 25px;
                    border-radius: 10px;
                    color: white;
                    font-weight: 500;
                    z-index: 1000;
                    animation: slideIn 0.3s ease;
                    max-width: 300px;
                    word-wrap: break-word;
                    ${type === 'success' ? 'background: #28a745;' : 'background: #dc3545;'}
                `;

                document.body.appendChild(notification);

                setTimeout(() => {
                    notification.style.animation = 'slideOut 0.3s ease';
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.parentNode.removeChild(notification);
                        }
                    }, 300);
                }, 3000);
            }
        }

        // Globalne funkcje dla onclick handlers
        let taskManager;

        function addTask() {
            taskManager.addTask();
        }

        // Inicjalizacja aplikacji
        document.addEventListener('DOMContentLoaded', () => {
            taskManager = new TaskManager();
        });

        // Dodatkowe style dla animacji powiadomień
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideOut {
                from {
                    opacity: 1;
                    transform: translateX(0);
                }
                to {
                    opacity: 0;
                    transform: translateX(100%);
                }
            }
        `;
        document.head.appendChild(style);
    </script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const nodes = Array.from(document.body.childNodes);

  for (const node of nodes) {
    if (
      node.nodeType === Node.TEXT_NODE &&
      node.textContent &&
      (
        node.textContent.trim().startsWith('```html') ||
        node.textContent.trim() === '```' ||
        node.textContent.trim() === 'html'
      )
    ) {
      node.remove();
    }
  }
});
</script>

</body>
</html>
