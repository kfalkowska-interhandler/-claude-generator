<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menedżer Zadań</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
        }

        .task-input {
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .task-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .add-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .sort-select {
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            background: white;
            cursor: pointer;
        }

        .search-input {
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-item {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            border-left: 4px solid #667eea;
        }

        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .task-item.completed {
            opacity: 0.7;
            border-left-color: #28a745;
            background: #f8f9fa;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            color: #333;
            transition: all 0.3s ease;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #888;
        }

        .task-date {
            font-size: 12px;
            color: #888;
            margin-right: 10px;
        }

        .delete-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(238, 90, 82, 0.3);
        }

        .delete-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(238, 90, 82, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .stat-item {
            flex: 1;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            display: block;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 0 10px;
                padding: 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .controls {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }

            .task-item {
                padding: 15px;
                flex-wrap: wrap;
            }

            .task-date {
                order: 3;
                flex-basis: 100%;
                margin-top: 10px;
                margin-right: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Menedżer Zadań</h1>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="totalTasks">0</span>
                <div class="stat-label">Wszystkich zadań</div>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="completedTasks">0</span>
                <div class="stat-label">Wykonanych</div>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="pendingTasks">0</span>
                <div class="stat-label">Do zrobienia</div>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="taskInput" class="task-input" placeholder="Wpisz nowe zadanie...">
            <button id="addBtn" class="add-btn">Dodaj</button>
            <select id="sortSelect" class="sort-select">
                <option value="newest">Najnowsze</option>
                <option value="oldest">Najstarsze</option>
                <option value="alphabetical">Alfabetycznie</option>
                <option value="completed">Wykonane</option>
                <option value="pending">Do zrobienia</option>
            </select>
        </div>

        <input type="text" id="searchInput" class="search-input" placeholder="Wyszukaj zadania...">

        <div id="tasksList" class="tasks-list">
            <div class="empty-state">
                <h3>Brak zadań</h3>
                <p>Dodaj swoje pierwsze zadanie powyżej</p>
            </div>
        </div>
    </div>

    <script>
        class TaskManager {
            constructor() {
                this.tasks = this.loadTasks();
                this.filteredTasks = [...this.tasks];
                this.init();
            }

            init() {
                this.bindEvents();
                this.render();
                this.updateStats();
            }

            bindEvents() {
                document.getElementById('addBtn').addEventListener('click', () => this.addTask());
                document.getElementById('taskInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTask();
                });
                document.getElementById('searchInput').addEventListener('input', (e) => this.search(e.target.value));
                document.getElementById('sortSelect').addEventListener('change', (e) => this.sort(e.target.value));
            }

            addTask() {
                const input = document.getElementById('taskInput');
                const text = input.value.trim();

                if (!text) {
                    alert('Proszę wpisać zadanie');
                    return;
                }

                const task = {
                    id: Date.now(),
                    text: text,
                    completed: false,
                    createdAt: new Date().toISOString()
                };

                this.tasks.unshift(task);
                this.filteredTasks = [...this.tasks];
                this.saveTasks();
                this.render();
                this.updateStats();
                input.value = '';
            }

            deleteTask(id) {
                if (confirm('Czy na pewno chcesz usunąć to zadanie?')) {
                    this.tasks = this.tasks.filter(task => task.id !== id);
                    this.filteredTasks = this.filteredTasks.filter(task => task.id !== id);
                    this.saveTasks();
                    this.render();
                    this.updateStats();
                }
            }

            toggleTask(id) {
                const task = this.tasks.find(task => task.id === id);
                if (task) {
                    task.completed = !task.completed;
                    this.saveTasks();
                    this.render();
                    this.updateStats();
                }
            }

            search(query) {
                const searchTerm = query.toLowerCase();
                this.filteredTasks = this.tasks.filter(task =>
                    task.text.toLowerCase().includes(searchTerm)
                );
                this.render();
            }

            sort(criteria) {
                switch (criteria) {
                    case 'newest':
                        this.filteredTasks.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                        break;
                    case 'oldest':
                        this.filteredTasks.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                        break;
                    case 'alphabetical':
                        this.filteredTasks.sort((a, b) => a.text.localeCompare(b.text, 'pl'));
                        break;
                    case 'completed':
                        this.filteredTasks.sort((a, b) => b.completed - a.completed);
                        break;
                    case 'pending':
                        this.filteredTasks.sort((a, b) => a.completed - b.completed);
                        break;
                }
                this.render();
            }

            render() {
                const tasksList = document.getElementById('tasksList');

                if (this.filteredTasks.length === 0) {
                    tasksList.innerHTML = `
                        <div class="empty-state">
                            <h3>Brak zadań</h3>
                            <p>Dodaj swoje pierwsze zadanie powyżej</p>
                        </div>
                    `;
                    return;
                }

                tasksList.innerHTML = this.filteredTasks.map(task => `
                    <div class="task-item ${task.completed ? 'completed' : ''}">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                               onchange="taskManager.toggleTask(${task.id})">
                        <span class="task-text">${this.escapeHtml(task.text)}</span>
                        <span class="task-date">${this.formatDate(task.createdAt)}</span>
                        <button class="delete-btn" onclick="taskManager.deleteTask(${task.id})">Usuń</button>
                    </div>
                `).join('');
            }

            updateStats() {
                const total = this.tasks.length;
                const completed = this.tasks.filter(task => task.completed).length;
                const pending = total - completed;

                document.getElementById('totalTasks').textContent = total;
                document.getElementById('completedTasks').textContent = completed;
                document.getElementById('pendingTasks').textContent = pending;
            }

            formatDate(dateString) {
                const date = new Date(dateString);
                return date.toLocaleDateString('pl-PL', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
            }

            loadTasks() {
                const tasks = localStorage.getItem('tasks');
                return tasks ? JSON.parse(tasks) : [];
            }
        }

        const taskManager = new TaskManager();
    </script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const nodes = Array.from(document.body.childNodes);

  for (const node of nodes) {
    if (
      node.nodeType === Node.TEXT_NODE &&
      node.textContent &&
      (
        node.textContent.trim().startsWith('```html') ||
        node.textContent.trim() === '```' ||
        node.textContent.trim() === 'html'
      )
    ) {
      node.remove();
    }
  }
});
</script>

</body>
</html>
