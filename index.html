<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menedżer Zadań</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .controls {
            padding: 30px;
            border-bottom: 1px solid #eee;
        }

        .add-task-form {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .add-task-form input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            min-width: 250px;
        }

        .add-task-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .search-sort-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            min-width: 200px;
        }

        .sort-select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            font-size: 14px;
            cursor: pointer;
        }

        .tasks-container {
            padding: 30px;
            min-height: 300px;
        }

        .task-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 20px;
            margin-bottom: 15px;
            background: #fff;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease;
        }

        .task-item:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .task-item.completed {
            opacity: 0.7;
            background: #f8f9fa;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
            transform: scale(1.2);
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            line-height: 1.4;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #888;
        }

        .task-date {
            color: #888;
            font-size: 0.9em;
            margin-right: 15px;
        }

        .task-delete {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: 600;
        }

        .task-delete:hover {
            background: #ff3742;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .empty-subtext {
            opacity: 0.7;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .container {
                margin: 0;
                border-radius: 0;
            }

            .header h1 {
                font-size: 2em;
            }

            .add-task-form {
                flex-direction: column;
            }

            .add-task-form input {
                min-width: 100%;
            }

            .search-sort-container {
                flex-direction: column;
            }

            .search-box, .sort-select {
                min-width: 100%;
            }

            .task-stats {
                flex-direction: column;
                text-align: center;
            }

            .task-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .task-actions {
                display: flex;
                gap: 10px;
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Menedżer Zadań</h1>
            <p>Organizuj swoje zadania w prosty i efektywny sposób</p>
        </div>

        <div class="controls">
            <div class="add-task-form">
                <input type="text" id="taskInput" placeholder="Wpisz nowe zadanie..." maxlength="200">
                <button class="btn btn-primary" onclick="addTask()">Dodaj zadanie</button>
            </div>
            
            <div class="search-sort-container">
                <input type="text" id="searchInput" class="search-box" placeholder="Wyszukaj zadania...">
                <select id="sortSelect" class="sort-select">
                    <option value="newest">Najnowsze pierwsze</option>
                    <option value="oldest">Najstarsze pierwsze</option>
                    <option value="alphabetical">Alfabetycznie</option>
                    <option value="completed">Wykonane ostatnie</option>
                </select>
            </div>
        </div>

        <div class="tasks-container">
            <div class="task-stats">
                <div class="stat">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Wszystkie</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="pendingTasks">0</div>
                    <div class="stat-label">Do zrobienia</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="completedTasks">0</div>
                    <div class="stat-label">Wykonane</div>
                </div>
            </div>

            <div id="tasksList"></div>
        </div>
    </div>

    <script>
        let tasks = [];
        let filteredTasks = [];

        function loadTasks() {
            const savedTasks = localStorage.getItem('tasks');
            if (savedTasks) {
                tasks = JSON.parse(savedTasks);
                filteredTasks = [...tasks];
                updateDisplay();
            }
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const taskText = taskInput.value.trim();
            
            if (taskText === '') {
                alert('Proszę wpisać treść zadania!');
                return;
            }

            const newTask = {
                id: Date.now(),
                text: taskText,
                completed: false,
                createdAt: new Date().toISOString()
            };

            tasks.unshift(newTask);
            taskInput.value = '';
            saveTasks();
            applyFiltersAndSort();
            updateDisplay();
        }

        function deleteTask(taskId) {
            if (confirm('Czy na pewno chcesz usunąć to zadanie?')) {
                tasks = tasks.filter(task => task.id !== taskId);
                saveTasks();
                applyFiltersAndSort();
                updateDisplay();
            }
        }

        function toggleTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                applyFiltersAndSort();
                updateDisplay();
            }
        }

        function applyFiltersAndSort() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortSelect').value;

            filteredTasks = tasks.filter(task => 
                task.text.toLowerCase().includes(searchTerm)
            );

            switch (sortBy) {
                case 'oldest':
                    filteredTasks.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                    break;
                case 'alphabetical':
                    filteredTasks.sort((a, b) => a.text.localeCompare(b.text, 'pl'));
                    break;
                case 'completed':
                    filteredTasks.sort((a, b) => a.completed - b.completed);
                    break;
                case 'newest':
                default:
                    filteredTasks.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    break;
            }
        }

        function updateDisplay() {
            updateStats();
            renderTasks();
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(task => task.completed).length;
            const pending = total - completed;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = pending;
        }

        function renderTasks() {
            const tasksList = document.getElementById('tasksList');
            
            if (filteredTasks.length === 0) {
                const searchTerm = document.getElementById('searchInput').value;
                const emptyMessage = searchTerm ? 
                    `<div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-text">Brak wyników wyszukiwania</div>
                        <div class="empty-subtext">Spróbuj innych słów kluczowych</div>
                    </div>` :
                    `<div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <div class="empty-text">Brak zadań</div>
                        <div class="empty-subtext">Dodaj pierwsze zadanie, aby rozpocząć!</div>
                    </div>`;
                
                tasksList.innerHTML = emptyMessage;
                return;
            }

            tasksList.innerHTML = filteredTasks.map(task => {
                const date = new Date(task.createdAt).toLocaleString('pl-PL', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                return `
                    <div class="task-item ${task.completed ? 'completed' : ''}">
                        <input type="checkbox" class="task-checkbox" 
                               ${task.completed ? 'checked' : ''} 
                               onchange="toggleTask(${task.id})">
                        <span class="task-text ${task.completed ? 'completed' : ''}">${task.text}</span>
                        <span class="task-date">${date}</span>
                        <button class="task-delete" onclick="deleteTask(${task.id})">Usuń</button>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        document.getElementById('searchInput').addEventListener('input', function() {
            applyFiltersAndSort();
            updateDisplay();
        });

        document.getElementById('sortSelect').addEventListener('change', function() {
            applyFiltersAndSort();
            updateDisplay();
        });

        loadTasks();
    </script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const nodes = Array.from(document.body.childNodes);

  for (const node of nodes) {
    if (
      node.nodeType === Node.TEXT_NODE &&
      node.textContent &&
      (
        node.textContent.trim().startsWith('```html') ||
        node.textContent.trim() === '```' ||
        node.textContent.trim() === 'html'
      )
    ) {
      node.remove();
    }
  }
});
</script>

</body>
</html>
