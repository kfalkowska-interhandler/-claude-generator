<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menedżer Zadań</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .controls {
            padding: 30px;
            border-bottom: 1px solid #eee;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .task-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .task-input:focus {
            outline: none;
            border-color: #4facfe;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
        }

        .search-sort {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
        }

        .sort-select {
            padding: 10px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .tasks-container {
            padding: 30px;
            min-height: 400px;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #4facfe;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        .task-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .task-item.completed {
            opacity: 0.7;
            border-left-color: #28a745;
            background: #e8f5e8;
        }

        .task-checkbox {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            line-height: 1.4;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #6c757d;
        }

        .task-date {
            font-size: 12px;
            color: #6c757d;
            margin-right: 15px;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: #c82333;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #495057;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #4facfe;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #6c757d;
            margin-top: 5px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 10px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .controls {
                padding: 20px;
            }

            .input-group {
                flex-direction: column;
            }

            .task-input {
                min-width: auto;
            }

            .search-sort {
                flex-direction: column;
            }

            .search-input {
                min-width: auto;
            }

            .tasks-container {
                padding: 20px;
            }

            .task-item {
                flex-wrap: wrap;
                gap: 10px;
            }

            .task-date {
                order: 3;
                margin-right: 0;
            }

            .stats {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Menedżer Zadań</h1>
            <p>Organizuj swoje zadania efektywnie</p>
        </div>
        
        <div class="controls">
            <div class="input-group">
                <input type="text" id="taskInput" class="task-input" placeholder="Dodaj nowe zadanie..." maxlength="200">
                <button id="addBtn" class="btn btn-primary">Dodaj zadanie</button>
            </div>
            
            <div class="search-sort">
                <input type="text" id="searchInput" class="search-input" placeholder="Szukaj zadań...">
                <select id="sortSelect" class="sort-select">
                    <option value="newest">Najnowsze</option>
                    <option value="oldest">Najstarsze</option>
                    <option value="alphabetical">Alfabetycznie</option>
                    <option value="completed">Wykonane</option>
                    <option value="pending">Oczekujące</option>
                </select>
            </div>
        </div>
        
        <div class="tasks-container">
            <div id="tasksList"></div>
            <div id="emptyState" class="empty-state" style="display: none;">
                <h3>🎯 Brak zadań</h3>
                <p>Dodaj swoje pierwsze zadanie, aby zacząć organizować swoją pracę!</p>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div id="totalTasks" class="stat-number">0</div>
                <div class="stat-label">Wszystkich</div>
            </div>
            <div class="stat-item">
                <div id="pendingTasks" class="stat-number">0</div>
                <div class="stat-label">Oczekujących</div>
            </div>
            <div class="stat-item">
                <div id="completedTasks" class="stat-number">0</div>
                <div class="stat-label">Wykonanych</div>
            </div>
        </div>
    </div>

    <script>
        class TaskManager {
            constructor() {
                this.tasks = this.loadTasks();
                this.currentFilter = '';
                this.currentSort = 'newest';
                this.init();
            }

            init() {
                this.bindEvents();
                this.renderTasks();
                this.updateStats();
            }

            bindEvents() {
                const taskInput = document.getElementById('taskInput');
                const addBtn = document.getElementById('addBtn');
                const searchInput = document.getElementById('searchInput');
                const sortSelect = document.getElementById('sortSelect');

                addBtn.addEventListener('click', () => this.addTask());
                taskInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTask();
                });
                
                searchInput.addEventListener('input', (e) => {
                    this.currentFilter = e.target.value.toLowerCase();
                    this.renderTasks();
                });

                sortSelect.addEventListener('change', (e) => {
                    this.currentSort = e.target.value;
                    this.renderTasks();
                });
            }

            addTask() {
                const taskInput = document.getElementById('taskInput');
                const taskText = taskInput.value.trim();

                if (taskText === '') {
                    alert('Proszę wprowadzić treść zadania!');
                    return;
                }

                const newTask = {
                    id: Date.now(),
                    text: taskText,
                    completed: false,
                    createdAt: new Date().toISOString()
                };

                this.tasks.unshift(newTask);
                taskInput.value = '';
                this.saveTasks();
                this.renderTasks();
                this.updateStats();
            }

            toggleTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                }
            }

            deleteTask(id) {
                if (confirm('Czy na pewno chcesz usunąć to zadanie?')) {
                    this.tasks = this.tasks.filter(t => t.id !== id);
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                }
            }

            getFilteredTasks() {
                let filteredTasks = this.tasks.filter(task => 
                    task.text.toLowerCase().includes(this.currentFilter)
                );

                return this.getSortedTasks(filteredTasks);
            }

            getSortedTasks(tasks) {
                const sortedTasks = [...tasks];

                switch (this.currentSort) {
                    case 'oldest':
                        return sortedTasks.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                    case 'alphabetical':
                        return sortedTasks.sort((a, b) => a.text.localeCompare(b.text, 'pl'));
                    case 'completed':
                        return sortedTasks.sort((a, b) => b.completed - a.completed);
                    case 'pending':
                        return sortedTasks.sort((a, b) => a.completed - b.completed);
                    case 'newest':
                    default:
                        return sortedTasks.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                }
            }

            renderTasks() {
                const tasksList = document.getElementById('tasksList');
                const emptyState = document.getElementById('emptyState');
                const filteredTasks = this.getFilteredTasks();

                if (filteredTasks.length === 0) {
                    tasksList.innerHTML = '';
                    emptyState.style.display = 'block';
                    return;
                }

                emptyState.style.display = 'none';
                tasksList.innerHTML = filteredTasks.map(task => this.createTaskHTML(task)).join('');
            }

            createTaskHTML(task) {
                const date = new Date(task.createdAt).toLocaleDateString('pl-PL', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                return `
                    <div class="task-item ${task.completed ? 'completed' : ''}">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                               onchange="taskManager.toggleTask(${task.id})">
                        <span class="task-text ${task.completed ? 'completed' : ''}">${this.escapeHtml(task.text)}</span>
                        <span class="task-date">${date}</span>
                        <button class="btn-delete" onclick="taskManager.deleteTask(${task.id})">
                            🗑️ Usuń
                        </button>
                    </div>
                `;
            }

            updateStats() {
                const totalTasks = this.tasks.length;
                const completedTasks = this.tasks.filter(t => t.completed).length;
                const pendingTasks = totalTasks - completedTasks;

                document.getElementById('totalTasks').textContent = totalTasks;
                document.getElementById('completedTasks').textContent = completedTasks;
                document.getElementById('pendingTasks').textContent = pendingTasks;
            }

            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
            }

            loadTasks() {
                const tasks = localStorage.getItem('tasks');
                return tasks ? JSON.parse(tasks) : [];
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        const taskManager = new TaskManager();
    </script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const nodes = Array.from(document.body.childNodes);

  for (const node of nodes) {
    if (
      node.nodeType === Node.TEXT_NODE &&
      node.textContent &&
      (
        node.textContent.trim().startsWith('```html') ||
        node.textContent.trim() === '```' ||
        node.textContent.trim() === 'html'
      )
    ) {
      node.remove();
    }
  }
});
</script>

</body>
</html>
