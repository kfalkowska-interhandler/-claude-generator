<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menedżer Zadań</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .main-content {
            padding: 30px;
        }

        .task-form {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .task-input {
            flex: 1;
            min-width: 200px;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .task-input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .add-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 14px;
            outline: none;
        }

        .search-box:focus {
            border-color: #4facfe;
        }

        .sort-select {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 14px;
            outline: none;
            background: white;
            cursor: pointer;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 120px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card.completed {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .stat-card.pending {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .tasks-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .task-item {
            background: #f8f9ff;
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        .task-item:hover {
            border-color: #4facfe;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .task-item.completed {
            background: #e8f5e8;
            opacity: 0.7;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #ddd;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .task-checkbox.checked {
            background: #4facfe;
            border-color: #4facfe;
        }

        .task-checkbox.checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            line-height: 1.4;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #888;
        }

        .task-date {
            font-size: 12px;
            color: #888;
            background: white;
            padding: 5px 10px;
            border-radius: 10px;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #ff3742;
            transform: scale(1.05);
        }

        .no-tasks {
            text-align: center;
            color: #888;
            font-size: 18px;
            padding: 60px 20px;
            background: #f8f9ff;
            border-radius: 15px;
            border: 2px dashed #ddd;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .main-content {
                padding: 20px;
            }

            .task-form {
                flex-direction: column;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .stats {
                flex-direction: column;
            }

            .task-item {
                padding: 15px;
                flex-wrap: wrap;
                gap: 10px;
            }

            .task-date {
                order: 3;
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Menedżer Zadań</h1>
            <p>Zarządzaj swoimi zadaniami w prosty i efektywny sposób</p>
        </div>
        
        <div class="main-content">
            <form class="task-form" id="taskForm">
                <input type="text" class="task-input" id="taskInput" placeholder="Wprowadź nowe zadanie..." required>
                <button type="submit" class="add-btn">Dodaj zadanie</button>
            </form>

            <div class="controls">
                <input type="text" class="search-box" id="searchBox" placeholder="Wyszukaj zadania...">
                <select class="sort-select" id="sortSelect">
                    <option value="date-desc">Najnowsze pierwsze</option>
                    <option value="date-asc">Najstarsze pierwsze</option>
                    <option value="name-asc">A-Z</option>
                    <option value="name-desc">Z-A</option>
                    <option value="completed">Ukończone pierwsze</option>
                    <option value="pending">Oczekujące pierwsze</option>
                </select>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Wszystkich zadań</div>
                </div>
                <div class="stat-card completed">
                    <div class="stat-number" id="completedTasks">0</div>
                    <div class="stat-label">Ukończonych</div>
                </div>
                <div class="stat-card pending">
                    <div class="stat-number" id="pendingTasks">0</div>
                    <div class="stat-label">Oczekujących</div>
                </div>
            </div>

            <div class="tasks-list" id="tasksList">
                <div class="no-tasks">
                    Nie masz jeszcze żadnych zadań.<br>
                    Dodaj pierwsze zadanie powyżej!
                </div>
            </div>
        </div>
    </div>

    <script>
        class TaskManager {
            constructor() {
                this.tasks = JSON.parse(localStorage.getItem('tasks')) || [];
                this.taskIdCounter = parseInt(localStorage.getItem('taskIdCounter')) || 1;
                this.initEventListeners();
                this.renderTasks();
                this.updateStats();
            }

            initEventListeners() {
                const taskForm = document.getElementById('taskForm');
                const searchBox = document.getElementById('searchBox');
                const sortSelect = document.getElementById('sortSelect');

                taskForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.addTask();
                });

                searchBox.addEventListener('input', () => {
                    this.renderTasks();
                });

                sortSelect.addEventListener('change', () => {
                    this.renderTasks();
                });
            }

            addTask() {
                const taskInput = document.getElementById('taskInput');
                const taskText = taskInput.value.trim();

                if (taskText === '') return;

                const newTask = {
                    id: this.taskIdCounter++,
                    text: taskText,
                    completed: false,
                    createdAt: new Date().toISOString()
                };

                this.tasks.push(newTask);
                this.saveTasks();
                taskInput.value = '';
                this.renderTasks();
                this.updateStats();
            }

            deleteTask(id) {
                this.tasks = this.tasks.filter(task => task.id !== id);
                this.saveTasks();
                this.renderTasks();
                this.updateStats();
            }

            toggleTask(id) {
                const task = this.tasks.find(task => task.id === id);
                if (task) {
                    task.completed = !task.completed;
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                }
            }

            getFilteredAndSortedTasks() {
                const searchTerm = document.getElementById('searchBox').value.toLowerCase();
                const sortOption = document.getElementById('sortSelect').value;

                let filteredTasks = this.tasks.filter(task =>
                    task.text.toLowerCase().includes(searchTerm)
                );

                switch (sortOption) {
                    case 'date-asc':
                        filteredTasks.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                        break;
                    case 'date-desc':
                        filteredTasks.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                        break;
                    case 'name-asc':
                        filteredTasks.sort((a, b) => a.text.localeCompare(b.text));
                        break;
                    case 'name-desc':
                        filteredTasks.sort((a, b) => b.text.localeCompare(a.text));
                        break;
                    case 'completed':
                        filteredTasks.sort((a, b) => b.completed - a.completed);
                        break;
                    case 'pending':
                        filteredTasks.sort((a, b) => a.completed - b.completed);
                        break;
                }

                return filteredTasks;
            }

            renderTasks() {
                const tasksList = document.getElementById('tasksList');
                const tasks = this.getFilteredAndSortedTasks();

                if (tasks.length === 0) {
                    const searchTerm = document.getElementById('searchBox').value.trim();
                    const message = searchTerm 
                        ? `Nie znaleziono zadań dla frazy: "${searchTerm}"`
                        : 'Nie masz jeszcze żadnych zadań.<br>Dodaj pierwsze zadanie powyżej!';
                    
                    tasksList.innerHTML = `<div class="no-tasks">${message}</div>`;
                    return;
                }

                tasksList.innerHTML = tasks.map(task => `
                    <div class="task-item ${task.completed ? 'completed' : ''}">
                        <div class="task-checkbox ${task.completed ? 'checked' : ''}" 
                             onclick="taskManager.toggleTask(${task.id})"></div>
                        <div class="task-text ${task.completed ? 'completed' : ''}">${this.escapeHtml(task.text)}</div>
                        <div class="task-date">${this.formatDate(task.createdAt)}</div>
                        <button class="delete-btn" onclick="taskManager.deleteTask(${task.id})">Usuń</button>
                    </div>
                `).join('');
            }

            updateStats() {
                const totalTasks = this.tasks.length;
                const completedTasks = this.tasks.filter(task => task.completed).length;
                const pendingTasks = totalTasks - completedTasks;

                document.getElementById('totalTasks').textContent = totalTasks;
                document.getElementById('completedTasks').textContent = completedTasks;
                document.getElementById('pendingTasks').textContent = pendingTasks;
            }

            formatDate(dateString) {
                const date = new Date(dateString);
                return date.toLocaleDateString('pl-PL', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
                localStorage.setItem('taskIdCounter', this.taskIdCounter.toString());
            }
        }

        const taskManager = new TaskManager();
    </script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const nodes = Array.from(document.body.childNodes);

  for (const node of nodes) {
    if (
      node.nodeType === Node.TEXT_NODE &&
      node.textContent &&
      (
        node.textContent.trim().startsWith('```html') ||
        node.textContent.trim() === '```' ||
        node.textContent.trim() === 'html'
      )
    ) {
      node.remove();
    }
  }
});
</script>

</body>
</html>
