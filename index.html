<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menedżer Zadań</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .main-content {
            padding: 30px;
        }

        .task-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .task-input {
            flex: 1;
            min-width: 250px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .task-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            min-width: 200px;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .sort-select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .task-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            min-width: 120px;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .tasks-list {
            margin-top: 20px;
        }

        .task-item {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }

        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .task-item.completed {
            opacity: 0.7;
            background: #e8f5e8;
            border-color: #4caf50;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            color: #333;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #888;
        }

        .task-date {
            font-size: 12px;
            color: #888;
            margin-right: 10px;
        }

        .btn-delete {
            background: #ff4757;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #ff3742;
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .main-content {
                padding: 20px;
            }

            .task-form {
                flex-direction: column;
            }

            .task-input {
                min-width: auto;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .search-input {
                min-width: auto;
            }

            .task-item {
                padding: 15px;
                flex-wrap: wrap;
            }

            .task-stats {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .main-content {
                padding: 15px;
            }

            .stat-item {
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Menedżer Zadań</h1>
            <p>Organizuj swoje zadania w prosty sposób</p>
        </div>

        <div class="main-content">
            <form class="task-form" id="taskForm">
                <input type="text" class="task-input" id="taskInput" placeholder="Wpisz nowe zadanie..." required>
                <button type="submit" class="btn btn-primary">Dodaj zadanie</button>
            </form>

            <div class="controls">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Szukaj zadań...">
                <select class="sort-select" id="sortSelect">
                    <option value="newest">Najnowsze</option>
                    <option value="oldest">Najstarsze</option>
                    <option value="alphabetical">Alfabetycznie</option>
                    <option value="completed">Wykonane na końcu</option>
                </select>
            </div>

            <div class="task-stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Wszystkie</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completedTasks">0</div>
                    <div class="stat-label">Wykonane</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="pendingTasks">0</div>
                    <div class="stat-label">Do zrobienia</div>
                </div>
            </div>

            <div class="tasks-list" id="tasksList">
                <div class="empty-state" id="emptyState">
                    <div style="font-size: 4rem; margin-bottom: 20px;">📝</div>
                    <h3>Brak zadań</h3>
                    <p>Dodaj swoje pierwsze zadanie, aby rozpocząć!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        class TaskManager {
            constructor() {
                this.tasks = this.loadTasks();
                this.filteredTasks = [...this.tasks];
                this.initializeElements();
                this.bindEvents();
                this.render();
            }

            initializeElements() {
                this.taskForm = document.getElementById('taskForm');
                this.taskInput = document.getElementById('taskInput');
                this.searchInput = document.getElementById('searchInput');
                this.sortSelect = document.getElementById('sortSelect');
                this.tasksList = document.getElementById('tasksList');
                this.emptyState = document.getElementById('emptyState');
                this.totalTasksElement = document.getElementById('totalTasks');
                this.completedTasksElement = document.getElementById('completedTasks');
                this.pendingTasksElement = document.getElementById('pendingTasks');
            }

            bindEvents() {
                this.taskForm.addEventListener('submit', (e) => this.handleSubmit(e));
                this.searchInput.addEventListener('input', () => this.handleSearch());
                this.sortSelect.addEventListener('change', () => this.handleSort());
            }

            handleSubmit(e) {
                e.preventDefault();
                const taskText = this.taskInput.value.trim();
                if (taskText) {
                    this.addTask(taskText);
                    this.taskInput.value = '';
                }
            }

            addTask(text) {
                const task = {
                    id: Date.now(),
                    text: text,
                    completed: false,
                    createdAt: new Date().toISOString()
                };
                this.tasks.unshift(task);
                this.saveTasks();
                this.applyFiltersAndSort();
                this.render();
            }

            toggleTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    this.saveTasks();
                    this.applyFiltersAndSort();
                    this.render();
                }
            }

            deleteTask(id) {
                if (confirm('Czy na pewno chcesz usunąć to zadanie?')) {
                    this.tasks = this.tasks.filter(t => t.id !== id);
                    this.saveTasks();
                    this.applyFiltersAndSort();
                    this.render();
                }
            }

            handleSearch() {
                this.applyFiltersAndSort();
                this.render();
            }

            handleSort() {
                this.applyFiltersAndSort();
                this.render();
            }

            applyFiltersAndSort() {
                const searchTerm = this.searchInput.value.toLowerCase().trim();
                const sortType = this.sortSelect.value;

                this.filteredTasks = this.tasks.filter(task =>
                    task.text.toLowerCase().includes(searchTerm)
                );

                this.filteredTasks.sort((a, b) => {
                    switch (sortType) {
                        case 'oldest':
                            return new Date(a.createdAt) - new Date(b.createdAt);
                        case 'alphabetical':
                            return a.text.localeCompare(b.text, 'pl');
                        case 'completed':
                            if (a.completed === b.completed) {
                                return new Date(b.createdAt) - new Date(a.createdAt);
                            }
                            return a.completed ? 1 : -1;
                        case 'newest':
                        default:
                            return new Date(b.createdAt) - new Date(a.createdAt);
                    }
                });
            }

            render() {
                this.updateStats();
                this.renderTasks();
            }

            updateStats() {
                const total = this.tasks.length;
                const completed = this.tasks.filter(t => t.completed).length;
                const pending = total - completed;

                this.totalTasksElement.textContent = total;
                this.completedTasksElement.textContent = completed;
                this.pendingTasksElement.textContent = pending;
            }

            renderTasks() {
                if (this.filteredTasks.length === 0) {
                    this.emptyState.style.display = 'block';
                    this.tasksList.innerHTML = '';
                    this.tasksList.appendChild(this.emptyState);
                    return;
                }

                this.emptyState.style.display = 'none';
                this.tasksList.innerHTML = '';

                this.filteredTasks.forEach(task => {
                    const taskElement = this.createTaskElement(task);
                    this.tasksList.appendChild(taskElement);
                });
            }

            createTaskElement(task) {
                const taskItem = document.createElement('div');
                taskItem.className = `task-item ${task.completed ? 'completed' : ''}`;

                const date = new Date(task.createdAt).toLocaleString('pl-PL', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                taskItem.innerHTML = `
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                    <span class="task-text ${task.completed ? 'completed' : ''}">${this.escapeHtml(task.text)}</span>
                    <span class="task-date">${date}</span>
                    <button class="btn-delete">🗑️ Usuń</button>
                `;

                const checkbox = taskItem.querySelector('.task-checkbox');
                checkbox.addEventListener('change', () => this.toggleTask(task.id));

                const deleteBtn = taskItem.querySelector('.btn-delete');
                deleteBtn.addEventListener('click', () => this.deleteTask(task.id));

                return taskItem;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
            }

            loadTasks() {
                const saved = localStorage.getItem('tasks');
                return saved ? JSON.parse(saved) : [];
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new TaskManager();
        });
    </script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const nodes = Array.from(document.body.childNodes);

  for (const node of nodes) {
    if (
      node.nodeType === Node.TEXT_NODE &&
      node.textContent &&
      (
        node.textContent.trim().startsWith('```html') ||
        node.textContent.trim() === '```' ||
        node.textContent.trim() === 'html'
      )
    ) {
      node.remove();
    }
  }
});
</script>

</body>
</html>
