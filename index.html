<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menedżer Zadań</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .main-content {
            padding: 30px;
        }

        .task-form {
            background: #f8f9ff;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px solid #e1e5ff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5ff;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }

        .btn-danger:hover {
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .controls input, .controls select {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 2px solid #e1e5ff;
            border-radius: 10px;
            font-size: 14px;
        }

        .task-list {
            min-height: 200px;
        }

        .task-item {
            background: white;
            border: 2px solid #e1e5ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .task-item:hover {
            border-color: #4facfe;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.1);
        }

        .task-item.completed {
            opacity: 0.7;
            background: #f0f9ff;
            border-color: #22c55e;
        }

        .task-content {
            flex: 1;
            min-width: 250px;
        }

        .task-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: #666;
        }

        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            color: #666;
            flex-wrap: wrap;
        }

        .task-priority {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .priority-wysoki {
            background: #fee2e2;
            color: #dc2626;
        }

        .priority-sredni {
            background: #fef3c7;
            color: #d97706;
        }

        .priority-niski {
            background: #dcfce7;
            color: #16a34a;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 8px;
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        .btn-success:hover {
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state img {
            width: 100px;
            opacity: 0.5;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .main-content {
                padding: 20px;
            }

            .controls {
                flex-direction: column;
            }

            .controls input, .controls select {
                min-width: 100%;
            }

            .task-item {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .task-actions {
                justify-content: center;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Menedżer Zadań</h1>
            <p>Organizuj swoje zadania efektywnie</p>
        </div>

        <div class="main-content">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Wszystkie</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completedTasks">0</div>
                    <div class="stat-label">Wykonane</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pendingTasks">0</div>
                    <div class="stat-label">Oczekujące</div>
                </div>
            </div>

            <div class="task-form">
                <h3 style="margin-bottom: 20px; color: #333;">Dodaj nowe zadanie</h3>
                <form id="taskForm">
                    <div class="form-group">
                        <label for="taskTitle">Tytuł zadania:</label>
                        <input type="text" id="taskTitle" required placeholder="Wprowadź tytuł zadania...">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label for="taskPriority">Priorytet:</label>
                            <select id="taskPriority">
                                <option value="niski">🟢 Niski</option>
                                <option value="sredni" selected>🟡 Średni</option>
                                <option value="wysoki">🔴 Wysoki</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="taskDueDate">Termin wykonania:</label>
                            <input type="date" id="taskDueDate">
                        </div>
                    </div>
                    <button type="submit" class="btn">➕ Dodaj zadanie</button>
                </form>
            </div>

            <div class="controls">
                <input type="text" id="searchInput" placeholder="🔍 Szukaj zadań...">
                <select id="filterPriority">
                    <option value="">Wszystkie priorytety</option>
                    <option value="wysoki">🔴 Wysoki</option>
                    <option value="sredni">🟡 Średni</option>
                    <option value="niski">🟢 Niski</option>
                </select>
                <select id="filterStatus">
                    <option value="">Wszystkie statusy</option>
                    <option value="pending">Oczekujące</option>
                    <option value="completed">Wykonane</option>
                </select>
                <select id="sortBy">
                    <option value="date">Sortuj: Data dodania</option>
                    <option value="priority">Sortuj: Priorytet</option>
                    <option value="title">Sortuj: Tytuł</option>
                    <option value="dueDate">Sortuj: Termin</option>
                </select>
            </div>

            <div id="taskList" class="task-list">
                <div class="empty-state" id="emptyState">
                    <div style="font-size: 4rem; margin-bottom: 20px;">📝</div>
                    <h3>Brak zadań</h3>
                    <p>Dodaj swoje pierwsze zadanie aby rozpocząć!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        class TaskManager {
            constructor() {
                this.tasks = this.loadTasks();
                this.currentFilter = {
                    search: '',
                    priority: '',
                    status: ''
                };
                this.currentSort = 'date';
                this.initEventListeners();
                this.render();
                this.updateStats();
            }

            loadTasks() {
                const saved = localStorage.getItem('taskManager_tasks');
                return saved ? JSON.parse(saved) : [];
            }

            saveTasks() {
                localStorage.setItem('taskManager_tasks', JSON.stringify(this.tasks));
            }

            initEventListeners() {
                document.getElementById('taskForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.addTask();
                });

                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.currentFilter.search = e.target.value.toLowerCase();
                    this.render();
                });

                document.getElementById('filterPriority').addEventListener('change', (e) => {
                    this.currentFilter.priority = e.target.value;
                    this.render();
                });

                document.getElementById('filterStatus').addEventListener('change', (e) => {
                    this.currentFilter.status = e.target.value;
                    this.render();
                });

                document.getElementById('sortBy').addEventListener('change', (e) => {
                    this.currentSort = e.target.value;
                    this.render();
                });
            }

            addTask() {
                const title = document.getElementById('taskTitle').value.trim();
                const priority = document.getElementById('taskPriority').value;
                const dueDate = document.getElementById('taskDueDate').value;

                if (!title) return;

                const task = {
                    id: Date.now().toString(),
                    title: title,
                    priority: priority,
                    dueDate: dueDate || null,
                    completed: false,
                    createdAt: new Date().toISOString()
                };

                this.tasks.push(task);
                this.saveTasks();
                this.render();
                this.updateStats();
                document.getElementById('taskForm').reset();
            }

            deleteTask(id) {
                if (confirm('Czy na pewno chcesz usunąć to zadanie?')) {
                    this.tasks = this.tasks.filter(task => task.id !== id);
                    this.saveTasks();
                    this.render();
                    this.updateStats();
                }
            }

            toggleTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    this.saveTasks();
                    this.render();
                    this.updateStats();
                }
            }

            filterTasks() {
                return this.tasks.filter(task => {
                    const matchesSearch = task.title.toLowerCase().includes(this.currentFilter.search);
                    const matchesPriority = !this.currentFilter.priority || task.priority === this.currentFilter.priority;
                    const matchesStatus = !this.currentFilter.status || 
                        (this.currentFilter.status === 'completed' ? task.completed : !task.completed);

                    return matchesSearch && matchesPriority && matchesStatus;
                });
            }

            sortTasks(tasks) {
                return tasks.sort((a, b) => {
                    switch (this.currentSort) {
                        case 'title':
                            return a.title.localeCompare(b.title);
                        case 'priority':
                            const priorityOrder = { 'wysoki': 3, 'sredni': 2, 'niski': 1 };
                            return priorityOrder[b.priority] - priorityOrder[a.priority];
                        case 'dueDate':
                            if (!a.dueDate && !b.dueDate) return 0;
                            if (!a.dueDate) return 1;
                            if (!b.dueDate) return -1;
                            return new Date(a.dueDate) - new Date(b.dueDate);
                        case 'date':
                        default:
                            return new Date(b.createdAt) - new Date(a.createdAt);
                    }
                });
            }

            formatDate(dateString) {
                if (!dateString) return '';
                const date = new Date(dateString);
                return date.toLocaleDateString('pl-PL');
            }

            isOverdue(dateString) {
                if (!dateString) return false;
                const today = new Date();
                const dueDate = new Date(dateString);
                today.setHours(0, 0, 0, 0);
                dueDate.setHours(0, 0, 0, 0);
                return dueDate < today;
            }

            render() {
                const taskList = document.getElementById('taskList');
                const emptyState = document.getElementById('emptyState');
                
                const filteredTasks = this.filterTasks();
                const sortedTasks = this.sortTasks([...filteredTasks]);

                if (sortedTasks.length === 0) {
                    taskList.innerHTML = `
                        <div class="empty-state">
                            <div style="font-size: 4rem; margin-bottom: 20px;">📝</div>
                            <h3>${this.tasks.length === 0 ? 'Brak zadań' : 'Brak pasujących zadań'}</h3>
                            <p>${this.tasks.length === 0 ? 'Dodaj swoje pierwsze zadanie aby rozpocząć!' : 'Spróbuj zmienić filtry wyszukiwania'}</p>
                        </div>
                    `;
                    return;
                }

                taskList.innerHTML = sortedTasks.map(task => {
                    const isOverdue = this.isOverdue(task.dueDate) && !task.completed;
                    const overdueClass = isOverdue ? 'style="border-color: #ef4444 !important;"' : '';
                    
                    return `
                        <div class="task-item ${task.completed ? 'completed' : ''}" ${overdueClass}>
                            <div class="task-content">
                                <div class="task-title">
                                    ${task.title}
                                    ${isOverdue ? ' ⚠️' : ''}
                                </div>
                                <div class="task-meta">
                                    <span class="task-priority priority-${task.priority}">
                                        ${task.priority === 'wysoki' ? '🔴 Wysoki' : 
                                          task.priority === 'sredni' ? '🟡 Średni'
<script>
document.addEventListener('DOMContentLoaded', function () {
  const nodes = Array.from(document.body.childNodes);

  for (const node of nodes) {
    if (
      node.nodeType === Node.TEXT_NODE &&
      node.textContent &&
      (
        node.textContent.trim().startsWith('```html') ||
        node.textContent.trim() === '```' ||
        node.textContent.trim() === 'html'
      )
    ) {
      node.remove();
    }
  }
});
</script>
